server {
    listen 8081;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # PWA : ces fichiers ne doivent JAMAIS etre mis en cache,
    # sinon le navigateur ne detecte jamais les nouveaux builds.
    # (le match exact "= /xxx" est prioritaire sur la regex ci-dessous)
    location = /sw.js                { add_header Cache-Control "no-cache"; }
    location = /registerSW.js        { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
    location = /index.html           { add_header Cache-Control "no-cache"; }

    # Fichiers hashes par Vite (contenu immuable) : cache long
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
