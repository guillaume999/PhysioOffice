version: "3.8"

services:
  physiooffice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PB_URL: ${VITE_PB_URL:-http://localhost:8090}
    pull_policy: build
    container_name: ${CONTAINER_NAME:-physiooffice}
    ports:
      - "${HOST_PORT:-8080}:8081"
    restart: unless-stopped
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
